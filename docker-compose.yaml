# nginx proxy address - http://172.17.0.1:5055

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - overseerr
    ports:
      - "5055:5055"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./rootfs/config/overseerr:/config
      - ./rootfs/data/overseerr:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  overseerr:
    external: false
